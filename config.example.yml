# Project-level configuration for the multi-agent system.
# Agents read this file to understand project structure, task management, and conventions.

vcs:
  dev_branch: dev
  branch_prefix: "ai/"   # all branches: <branch_prefix><ISSUE-KEY> for both Epic and Task

tasks:
  provider: # jira / linear — choose one

  # When provider: jira — set project_key (and the `jira.transitions` block below).
  project_key: # Jira project key (issue prefix, e.g. AITSAI)

  # When provider: linear — set team_key + project instead of project_key.
  # team_key: # Linear team key (issue prefix, e.g. DMI)
  # project:  # Linear project name within the team

  workflow:
    # Semantic status key → display name in this project's tracker workflow.
    # Shared-plugin prompts reference statuses by the semantic key on the left;
    # the actual tracker name (right column) is resolved at runtime.
    # Tune each value to match what your Jira / Linear board exposes.
    statuses:
      to_do: "To Do"
      in_progress: "In Progress"
      qa: "QA"
      code_review: "Code Review"
      on_hold: "On Hold"
      awaiting_merge: "Awaiting Merge"
      awaiting_ops: "Awaiting Ops"     # devops handoff target — human executes runbook here
      done: "Done"

  # Jira-only block. Skip when provider: linear.
  # Transition IDs for moving between statuses. mcp__atlassian__jira_transition_issue
  # takes a numeric id (not a status name), and mcp__atlassian__jira_get_transitions
  # returns only {id, name} (no to_status field) — so the id must be known up-front.
  # Populate this map once by running /sentinel-bootstrap-jira; re-run when the
  # Jira workflow changes (statuses added / IDs reassigned).
  jira:
    transitions:
      to_do: 0           # replace 0 with the real numeric id
      in_progress: 0
      qa: 0
      code_review: 0
      on_hold: 0
      awaiting_merge: 0
      awaiting_ops: 0
      done: 0

docs:
  root: ai   # optional: path (relative to project root) to free-form human docs — read by team-lead for project context

# Project-level path fence for the devops agent.
# Globs are resolved relative to project root. Files matching any glob below
# are devops's write scope; dev/qa/reviewer treat them as out-of-scope.
# Devops is project-scoped (no per-area entry); this list is the single
# source of truth for what counts as infra in this repo.
devops_paths:
  - "apps/*/Dockerfile"
  - "apps/*/Dockerfile.*"
  - "Dockerfile"
  - "docker-compose*.yml"
  - "docker-compose*.yaml"
  - ".dockerignore"
  - ".github/workflows/**"
  - ".gitlab-ci.yml"
  - "bitbucket-pipelines.yml"
  - "Justfile"
  - ".env.example"
  - "**/.env.example"
  - "infra/**"
  - "deploy/**"

runtime:
  # python: .venv/bin/python                          # used by dev/qa for test_command resolution
  # node:   node_modules/.bin                         # used by frontend areas with npm/pnpm test_command
  # pnpm: pnpm                                        # system-installed pnpm; agents call as `pnpm -C apps/<area> <script>`
  # frontend_bin_dir: apps/<area>/node_modules/.bin   # for direct binary calls (e.g. vitest, eslint) without pnpm wrapper

worktree:
  # Gitignored runtime artifacts to symlink from the repo root into every
  # per-task worktree at bootstrap (commands/run.md reads this list). A fresh
  # worktree is a clean checkout, so it lacks these dirs; recipes that call
  # them by relative path (a venv interpreter, an installed CLI) fail there
  # until linked. List the dependency / runtime directories your stack keeps
  # out of version control. Leave empty for projects with no such artifacts.
  link_paths:
    # - .venv          # Python virtualenv (matches runtime.python: .venv/bin/python)
    # - node_modules   # Node dependencies (matches runtime.node / frontend_bin_dir)
